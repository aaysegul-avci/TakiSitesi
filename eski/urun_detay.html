<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Ürün Detayı - FLORIA</title>
    <link rel="stylesheet" href="styles.css?v=20260331-2">
    <style>
        .product-detail { display: flex; max-width: 1000px; margin: 50px auto; background: white; padding: 40px; border-radius: 20px; gap: 40px; }
        .detail-img { flex: 1; }
        .detail-img img { width: 100%; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .detail-content { flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .detail-content h1 { font-size: 36px; color: #5d4157; }
        .detail-price { font-size: 28px; color: #ce68c6; font-weight: bold; margin: 20px 0; }
        .detail-desc { line-height: 1.6; color: #666; margin-bottom: 30px; }
    </style>
</head>
<body>
    <div class="product-detail">
        <div class="detail-img">
            <img src="images/kalpli-yuzuk.jpg" alt="Urun"> </div>
        <div class="detail-content">
            <h1>Kalpli Yüzük</h1>
            <p class="detail-price">₺150</p>
            <p class="detail-desc">Zarif tasarımı ve ışıltılı detaylarıyla bu kalpli yüzük, her anınıza şıklık katmak için tasarlandı. Ayarlanabilir yapısı sayesinde her parmağa uygundur.</p>
            <button class="add-to-cart" style="width: 200px;">Sepete Ekle</button>
            <br>
            <a href="index.html" style="color: #5d4157; text-decoration: none;">← Geri Dön</a>
        </div>
    </div>
</body>
</html>
